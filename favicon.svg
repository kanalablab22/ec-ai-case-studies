<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8a56"/>
      <stop offset="100%" style="stop-color:#1a6b3c"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gear outer ring -->
  <circle cx="32" cy="30" r="16" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
  <!-- Gear teeth (simplified 6 teeth) -->
  <g fill="rgba(255,255,255,0.25)">
    <rect x="29" y="11" width="6" height="5" rx="1"/>
    <rect x="29" y="44" width="6" height="5" rx="1"/>
    <rect x="13" y="27" width="5" height="6" rx="1"/>
    <rect x="46" y="27" width="5" height="6" rx="1"/>
    <rect x="17.5" y="16" width="5" height="6" rx="1" transform="rotate(-45 20 19)"/>
    <rect x="41.5" y="38" width="5" height="6" rx="1" transform="rotate(-45 44 41)"/>
    <rect x="41.5" y="16" width="5" height="6" rx="1" transform="rotate(45 44 19)"/>
    <rect x="17.5" y="38" width="5" height="6" rx="1" transform="rotate(45 20 41)"/>
  </g>
  <!-- AI sparkle / neural node in center -->
  <circle cx="32" cy="30" r="7" fill="white" opacity="0.95"/>
  <circle cx="32" cy="30" r="3.5" fill="#2d8a56"/>
  <!-- Small connection dots -->
  <circle cx="22" cy="22" r="2" fill="white" opacity="0.7"/>
  <circle cx="42" cy="22" r="2" fill="white" opacity="0.7"/>
  <circle cx="22" cy="38" r="2" fill="white" opacity="0.7"/>
  <circle cx="42" cy="38" r="2" fill="white" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="25" y1="24" x2="29" y2="28" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="39" y1="24" x2="35" y2="28" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="25" y1="36" x2="29" y2="32" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <line x1="39" y1="36" x2="35" y2="32" stroke="white" stroke-width="1.2" opacity="0.5"/>
  <!-- Bottom text area -->
  <text x="32" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="800" fill="white" letter-spacing="0.5" opacity="0.9">AI</text>
</svg>